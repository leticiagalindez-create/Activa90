<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recursos — Activa 90</title>

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/resources.css">
  <script src="js/theme.js"></script>
</head>
<body class="page-resources">

  <!-- ── App Header ───────────────────────────────────────────── -->
  <header class="app-header">
    <a href="dashboard.html" class="header__logo">
      <img src="KWLogo.png" alt="Keller Williams" class="header__kw-logo">
      <span class="header__logo-text">Activa <span>90</span></span>
    </a>

    <nav class="header__nav">
      <a href="dashboard.html" class="nav-link">🏠 Inicio</a>
      <a href="manual.html" class="nav-link">📖 Manual</a>
      <a href="resources.html" class="nav-link active">📦 Recursos</a>
    </nav>

    <div class="header__user">
      <button class="theme-toggle" aria-label="Cambiar tema">
        <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-name" id="user-name-display"></span>
      <button id="signout-btn" class="btn btn-ghost btn-sm">Salir</button>
    </div>
  </header>

  <!-- ── Resources Main ───────────────────────────────────────── -->
  <main class="resources-main">

    <!-- Page Header -->
    <div class="resources-page-header">
      <nav class="breadcrumb" style="margin-bottom:var(--space-4);">
        <a href="dashboard.html">Inicio</a>
        <span class="breadcrumb__separator">/</span>
        <span class="breadcrumb__current">Recursos</span>
      </nav>
      <h1>Recursos del Curso</h1>
      <p>Descarga las herramientas, plantillas y archivos de seguimiento de Activa 90.</p>
    </div>

    <!-- All Resources -->
    <section class="resources-section">
      <div class="section-header">
        <h2 class="section-title">Todos los Recursos</h2>
        <span class="badge badge-primary">5 recursos</span>
      </div>

      <div class="resources-grid" id="resources-grid">
        <!-- Rendered by resources.js -->
        <div class="skeleton" style="height:200px; border-radius:var(--radius-xl);"></div>
        <div class="skeleton" style="height:200px; border-radius:var(--radius-xl);"></div>
        <div class="skeleton" style="height:200px; border-radius:var(--radius-xl);"></div>
        <div class="skeleton" style="height:200px; border-radius:var(--radius-xl);"></div>
        <div class="skeleton" style="height:200px; border-radius:var(--radius-xl);"></div>
      </div>
    </section>

  </main>

  <!-- ── Footer ───────────────────────────────────────────────── -->
  <footer class="app-footer">
    <p>© 2026 Activa 90 · Keller Williams · Programa de Entrenamiento Inmobiliario</p>
  </footer>

  <!-- ── Scripts ──────────────────────────────────────────────── -->
  <script src="js/config.js"></script>
  <script type="module" src="js/auth-guard.js"></script>
  <script type="module" src="js/modules/resources.js"></script>

</body>
</html>
