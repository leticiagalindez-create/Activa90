<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Módulo — Activa 90</title>

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/mammoth-overrides.css">
  <link rel="stylesheet" href="css/pages/module.css">
  <script src="js/theme.js"></script>
</head>
<body class="page-module">

  <!-- ── App Header ───────────────────────────────────────────── -->
  <header class="app-header">
    <a href="dashboard.html" class="header__logo">
      <img src="KWLogo.png" alt="Keller Williams" class="header__kw-logo">
      <span class="header__logo-text">Activa <span>90</span></span>
    </a>

    <nav class="header__nav">
      <a href="dashboard.html" class="nav-link">🏠 Inicio</a>
      <a href="resources.html" class="nav-link">📦 Recursos</a>
    </nav>

    <div class="header__user">
      <button class="theme-toggle" aria-label="Cambiar tema">
        <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-name" id="user-name-display"></span>
      <button id="signout-btn" class="btn btn-ghost btn-sm">Salir</button>
    </div>
  </header>

  <!-- ── Module Page Layout ───────────────────────────────────── -->
  <div class="module-page-layout">

    <!-- Breadcrumb -->
    <nav class="breadcrumb">
      <a href="dashboard.html">Inicio</a>
      <span class="breadcrumb__separator">/</span>
      <span class="breadcrumb__current" id="breadcrumb-module-title">Módulo</span>
    </nav>

    <!-- Module Header -->
    <header class="module-header">
      <div class="module-header__meta">
        <span class="module-number-badge" id="module-number-badge">Módulo</span>
        <span class="module-status-badge" id="module-status-badge"></span>
      </div>
      <h1 id="module-title">Cargando...</h1>
      <p class="module-header__subtitle" id="module-subtitle"></p>
    </header>

    <!-- Tabs Container -->
    <div class="module-tabs-container">

      <!-- Tab Navigation -->
      <nav class="tab-nav" id="tab-nav">
        <!-- Rendered by module-page.js -->
      </nav>

      <!-- Clínica Panel -->
      <section id="panel-clinica" class="tab-panel" role="tabpanel">
        <div id="clinica-content">
          <!-- Mammoth renders DOCX here -->
        </div>
      </section>

      <!-- Presentación Panel -->
      <section id="panel-presentacion" class="tab-panel" role="tabpanel">
        <div id="presentacion-content">
          <!-- pptx-handler.js renders cards here -->
        </div>
      </section>

      <!-- Workbook Panel -->
      <section id="panel-workbook" class="tab-panel" role="tabpanel">
        <div id="workbook-content">
          <!-- workbook download header + Mammoth renders here -->
        </div>
      </section>

      <!-- Evaluación Panel -->
      <section id="panel-evaluacion" class="tab-panel" role="tabpanel">
        <div id="evaluacion-content">
          <!-- Google Form embed renders here -->
        </div>
      </section>

    </div>

    <!-- Completion Footer -->
    <div class="module-completion-footer">
      <div class="module-completion-footer__info">
        <p id="complete-hint" style="color:var(--color-text-muted); font-size:var(--font-size-sm);">
          Visita todos los materiales disponibles para habilitar la finalización.
        </p>
      </div>
      <button class="btn btn-success btn-lg" id="complete-btn" disabled>
        ✓ Marcar como Completado
      </button>
    </div>

  </div>

  <!-- ── Footer ───────────────────────────────────────────────── -->
  <footer class="app-footer">
    <p>© 2026 Activa 90 · Keller Williams · Programa de Entrenamiento Inmobiliario</p>
  </footer>

  <!-- ── Scripts ──────────────────────────────────────────────── -->
  <script src="js/config.js"></script>
  <script type="module" src="js/auth-guard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxjs@1.3.0/dist/pptxjs.min.js"></script>
  <script type="module" src="js/modules/module-page.js"></script>

</body>
</html>
